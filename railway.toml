[build]
builder = "nixpacks"
buildCommand = "corepack enable && pnpm install && pnpm --filter @workspace/api-server run build"

[build.environment]
NIXPACKS_NODE_VERSION = "20"

[deploy]
releaseCommand = "pnpm --filter @workspace/db run push-force"
startCommand = "pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
